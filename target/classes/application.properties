spring.application.name=alumni-platform

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/alumni_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=6003

# JWT Configuration
jwt.secret=alumni_platform_secret_key_2024_very_long_secret_key_for_security
jwt.expiration=86400000

# CORS
spring.mvc.cors.allowed-origins=http://localhost:3000
