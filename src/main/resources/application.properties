spring.application.name=alumni-platform

# MySQL Database Configuration (Railway Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port (Railway automatically provides PORT)
server.port=${PORT:6003}

# JWT Configuration
jwt.secret=alumni_platform_secret_key_2024_very_long_secret_key_for_security
jwt.expiration=86400000

# CORS
spring.mvc.cors.allowed-origins=*
